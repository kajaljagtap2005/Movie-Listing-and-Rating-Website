<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub | Discover & Rate</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-cyan" href="index.html">MOVIE<span class="text-white">HUB</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list text-white fs-1"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section d-flex align-items-center">
        <div class="container text-center" data-aos="zoom-out" data-aos-duration="1500">
            <h1 class="display-1 fw-bolder tracking-in-expand">CINEMA PARADISO</h1>
            <p class="lead text-cyan-light mb-4">Explore the finest classics of Indian Cinema with live ratings.</p>
            <a href="#explore" class="btn btn-cyan btn-lg rounded-pill px-5 shadow-lg">Explore Library</a>
        </div>
    </section>

    <div class="container py-5" id="explore">
        <div class="row mb-5 align-items-center">
            <div class="col-md-6"><h2 class="fw-bold border-start border-cyan border-4 ps-3">Trending Movies</h2></div>
            <div class="col-md-6">
                <div class="input-group glass-card">
                    <span class="input-group-text bg-transparent border-0 text-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control bg-transparent border-0 text-white" placeholder="Search by title...">
                </div>
            </div>
        </div>

         <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="movieGrid">
            </div>
    </div>

    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content glass-modal border-0 text-white">
                <div class="modal-body p-0">
                    <div class="row g-0">
                        <div class="col-lg-5">
                            <img id="modalPoster" src="" class="img-fluid w-100 h-100 object-fit-cover rounded-start" alt="Poster">
                        </div>
                        <div class="col-lg-7 p-4 p-md-5">
                            <button type="button" class="btn-close btn-close-white float-end" data-bs-dismiss="modal"></button>
                            <h2 id="modalTitle" class="display-4 fw-bold text-cyan"></h2>
                            <p id="modalMeta" class="text-muted fs-5"></p>
                            <hr class="border-cyan">
                            <p id="modalDesc" class="fs-5 lh-base my-4"></p>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="movieGrid">
            </div>
    </div>
