<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMagic | Premium Movie Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Cine<span>Magic</span></div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay">
            <div class="hero-content" data-aos="fade-up">
                <h1>Ultimate Cinema Experience</h1>
                <p>Explore high-rated hits with real-time trailers and interactive ratings.</p>
                <div class="hero-btns">
                    <a href="#movies" class="cta-btn main-btn">Start Watching</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container" id="movies">
        <h2 class="section-title">Trending Now</h2>
        <div class="movie-grid" id="movieGrid">
            </div>
    </main>

    <section class="feedback-container">
        <div class="feedback-card" data-aos="zoom-in">
            <h2>User Review Portal</h2>
            <p>Which 2025 release are you most excited for?</p>
            <form id="feedbackForm">
                <div class="input-group">
                    <input type="text" id="userName" placeholder="Your Name" required>
                    <textarea id="userText" placeholder="Write your review here..." required></textarea>
                </div>
                <div class="form-footer">
                    <button type="submit" class="submit-btn">Submit Feedback</button>
                </div>
            </form>
            <div id="successMessage" class="hidden-msg">
                <div class="msg-content">
                    <i class="fas fa-check-circle"></i>
                    <p>Thank you! Your feedback has been submitted successfully.</p>
                </div>
            </div>
        </div>
    </section>

    <div id="videoModal" class="modal">
        <div class="modal-box">
            <span class="close-modal">&times;</span>
            <div class="video-ratio">
                <iframe id="mainPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
